version: "3.9"

# ============================================================
# SAPDE — Orquestación Docker
#
# Uso:
#   docker compose up --build          levanta todo
#   docker compose up db               solo base de datos
#   docker compose up -d backend       API en segundo plano
#   docker compose logs -f backend     logs del API
#   docker compose down -v             detiene y borra volúmenes
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: sapde_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sapde_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sapde_password}
      POSTGRES_DB: ${POSTGRES_DB:-sapde_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sapde_user} -d ${POSTGRES_DB:-sapde_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # API FastAPI (OE4 — backend)
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sapde_backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data/raw:/app/data/raw:ro
      - ./data/processed:/app/data/processed:ro
      - ./reports:/app/reports:ro
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------
  # Dashboard Streamlit (OE4 — frontend)
  # ----------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: sapde_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    volumes:
      - ./models:/app/models:ro
      - ./reports:/app/reports:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    name: sapde_postgres_data
